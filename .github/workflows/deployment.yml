name: Deployment
run-name: Deployment (${{ github.ref_name }})

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: europe-west1-docker.pkg.dev/tobythe-dev/read-receipt/read-receipt
  ARCHIVE_NAME: Build
  ARCHIVE_PATH: ./docker-build.tar

jobs:
  integration:
    name: Run integration
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  deploy:
    name: Deploy

    runs-on: ubuntu-latest

    needs:
      - integration

    permissions:
      contents: read
      id-token: write

    environment:
      name: Production
      url: https://read-receipt.tobythe.dev

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Login to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: read-receipt@tobythe-dev.iam.gserviceaccount.com

      - name: Set up GCP SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Download Docker image
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARCHIVE_NAME }}

      - name: Load Docker image
        run: docker load --input ${{ env.ARCHIVE_PATH }}

      - name: Tag Docker image as latest
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image
        run: docker push ${{ env.IMAGE_NAME }} --all-tags

      - name: Deploy via infra/
        run: bun run infra:apply
        env:
          IMAGE_TAG: ${{ github.sha }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
